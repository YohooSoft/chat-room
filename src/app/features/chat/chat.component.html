<section class="chat-shell">
  <header>
    <h1>AI Drama Engine</h1>
    <p>{{ roomStore.activeRoom().name }}</p>
  </header>

  <main class="message-list">
    @for (message of currentMessages(); track trackById($index, message)) {
      <article class="message" [class.user]="message.role === 'user'">
        <strong>{{ message.senderId }}</strong>
        <p>{{ message.content }}</p>
      </article>
    }

    @if (uiStore.typing()) {
      <article class="message typing">
        <strong>系统</strong>
        <p>AI 正在思考...</p>
      </article>
    }
  </main>

  <form (ngSubmit)="submit()" class="chat-input">
    <input
      type="text"
      [ngModel]="input()"
      (ngModelChange)="input.set($event)"
      name="message"
      placeholder="输入一段剧情，触发多角色讨论"
      autocomplete="off"
    />
    <button type="submit">发送</button>
  </form>
</section>
